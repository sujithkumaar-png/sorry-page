<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        text-align: center;
    }

    .container {
        background: rgba(0,0,0,0.4);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        animation: fadeIn 2s ease-in-out;
    }

    h1 {
        font-size: 3rem;
        margin-bottom: 10px;
    }

    p {
        font-size: 1.2rem;
        line-height: 1.6;
    }

    .heart {
        font-size: 2rem;
        animation: heartbeat 1s infinite;
    }

    button {
        margin-top: 20px;
        padding: 12px 25px;
        border: none;
        border-radius: 25px;
        background: #ff4b5c;
        color: white;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #ff1e3c;
    }

    @keyframes heartbeat {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.2); }
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>
</head>
<body>

<div class="container">
    <h1>I'm Really Sorry 😔</h1>
    <p>
        I know I made a mistake...<br>
        And I never wanted to hurt you 💔<br><br>
        <br>
        Please forgive me 🙏
    </p>

    <div class="heart">❤️</div>

    <button onclick="playMusic()">Tap to Feel My Apology 🎶</button>

    <audio id="song" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<script>
function playMusic() {
    document.getElementById("song").play();
    alert("Please Take my apology 🙏🙏❤️");
}
<button onclick="forgive()">Will you forgive me? ❤️</button>

<script>
function forgive() {
    alert("Yayyy 🥰 Thank you for forgiving me ❤️");
}
</script>

</body>
</html>
